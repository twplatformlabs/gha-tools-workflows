# yamllint disable rule:line-length
# yamllint disable rule:truthy
---
name: gh runner release

# description:
#
# Combine the runner-release workflow with an 'on tag' trigger to perform semantic releases of gha runners.
#
# Uses:
#   (Optional) twplatformlabs/gha-tools-actions/install (install package dependencies when pre-configured runner not used)
#   twplatformlabs/gha-tools-actions/tagx (add semantic tag to development build based on bake file configuration)
#   (Optional) twplatformlabs/gha-tools-actions/sign-manifest (sign manifest using cosign)
#
#
# Use after-checkout local Action to setup ENV values as needed.
# Many steps provide additional configuration parameters. See inputs below
# for usage details and default settings. Additional step details are available
# in the associated twplatformlabs/gha-tools-actions repository.
# Includes Action hooks at:
# - after-checkout
# - before-release
# - after-release

on:
  workflow_call:

    secrets:
      OP_SERVICE_ACCOUNT_TOKEN:
        description: 1password vault services account token
        required: false

    inputs:

      registry:
        description: OCI compatible registry. Default is docker.io.
        required: false
        type: string
        default: docker.io

      bake-file:
        description: Name of docker bake json file. Default is docker-bake.json.
        required: false
        type: string
        default: "docker-bake.json"
      commit-tag:
        description: Value for development build tag. Default is dev.${GITHUB_SHA:0:7}.
        required: false
        type: string
        default: ""
      target:
        description: Bake file targets to build. Default is runner.
        required: false
        type: string
        default: "runners"
      release-tag:
        description: Value for release tag. Default is git tag ($GITHUB_REF_NAME).
        required: false
        type: string
        default: ""
      include-latest:
        description: Include latest tag in release. Default is false.
        required: false
        type: string
        default: "false"

      sign-manifest:
        description: Sign release images manifest. Default is false.
        required: false
        type: string
        default: "false"
      cosign-version:
        description: Install Cosign version. Default is skip.
        required: false
        type: string
        default: ""
      cosign-sign-key:
        description: Path to private key used to sign image. Default is ./cosign.key
        required: false
        type: string
        default: cosign.key
      cosign-verify-key:
        description: Path to public key used to verify signature. Default is ./cosign.pub
        required: false
        type: string
        default: cosign.pub

      op-version:
        description: Install 1password-cli version. Default is skip.
        required: false
        type: string
        default: ""
      teller-version:
        description: Install teller version. Default is skip.
        required: false
        type: string
        default: ""
      vault-version:
        description: Install vault version. Default is skip.
        required: false
        type: string
        default: ""
      scout-version:
        description: Install docker scout version. Default is skip.
        required: false
        type: string
        default: ""
      oras-version:
        description: Install oras version. Default is skip.
        required: false
        type: string
        default: ""

      after-checkout:
        description: Optionally call ./.github/actions/after-checkout after code checkout. Default is skip.
        required: false
        type: string
        default: "false"
      before-release:
        description: Optionally call ./.github/actions/before-release before docker release. Default is skip.
        required: false
        type: string
        default: "false"
      after-release:
        description: Optionally call ./.github/actions/after-release after docker release. Default is skip.
        required: false
        type: string
        default: "false"

      builder-image-version:
        description: Define custom workflow runner image. Default is ghcr.io/twplatformlabs/gha-tools-runner:latest.
        type: string
        required: false
        default: "ghcr.io/twplatformlabs/gha-tools-runner:latest"

permissions:
  contents: write

jobs:

  runner-dev-release:
    name: runner release workflow
    runs-on: ubuntu-latest
    container: ${{ inputs.builder-image-version }}

    env:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

    steps:
      - name: checkout code
        uses: actions/checkout@v6

      - name: run custom after-checkout action
        if: ${{ inputs.after-checkout != 'false' }}
        uses: ./.github/actions/after-checkout
        with:
          flag: ${{ inputs.after-checkout }}

      - name: install dev-release dependencies
        uses: twplatformlabs/gha-tools-actions/install@main
        with:
          op-version: ${{ inputs.op-version }}
          teller-version: ${{ inputs.teller-version }}
          vault-version: ${{ inputs.vault-version }}
          oras-version: ${{ inputs.oras-version }}
          cosign-version: ${{ inputs.cosign-version }}

      - name: run custom before-release action
        if: ${{ inputs.before-release != 'false' }}
        uses: ./.github/actions/before-release
        with:
          flag: ${{ inputs.before-release }}

      - name: confirm registry credentials and access
        uses: twplatformlabs/gha-tools-actions/confirm-registry@main
        with:
          registry: ${{ inputs.registry }}

      - name: Tag image manifest for release based on bake file targets
        uses: twplatformlabs/gha-tools-actions/tagx@main
        with:
          bake-file: ${{ inputs.bake-file }}
          commit-tag: ${{ inputs.commit-tag }}
          target: ${{ inputs.target }}
          release-tag: ${{ inputs.release-tag }}
          include-latest: ${{ inputs.include-latest }}

      - name: Sign image manifest based on bake file targets
        if: ${{ inputs.sign-manifest != 'false' }}
        uses: twplatformlabs/gha-tools-actions/sign-manifest@main
        with:
          bake-file: ${{ inputs.bake-file }}
          release-tag: ${{ inputs.release-tag }}
          cosign-sign-key: ${{ inputs.cosign-sign-key }}
          cosign-verify-key: ${{ inputs.cosign-verify-key }}

      - name: run custom after-release action
        if: ${{ inputs.after-release != 'false' }}
        uses: ./.github/actions/after-release
        with:
          flag: ${{ inputs.after-release }}
